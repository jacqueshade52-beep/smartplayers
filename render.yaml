services:
  - type: web
    name: smartplayers
    runtime: docker
    repo: https://github.com/jacqueshade52-beep/smartplayers
    plan: free
    dockerCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan key:generate
      php artisan serve --port=$PORT --host=0.0.0.0
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr