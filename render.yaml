services:
  - type: web
    name: smartplayers
    runtime: image
    repo: https://github.com/jacqueshade52-beep/smartplayers
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr